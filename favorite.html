<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check Your Favorite K-Food | $ourceat</title>
  <meta name="description" content="Answer 3 quick questions and find your perfect Korean food match — with links to buy it now."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥘</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#1D9E75;--teal-light:#E1F5EE;--gray-100:#F7F7F5;--gray-200:#EFEFEB;--gray-400:#9A9A94;--gray-900:#1A1A18}
    body{font-family:'DM Sans',sans-serif;background:#fff;color:var(--gray-900);min-height:100vh;display:flex;flex-direction:column}
    header{height:58px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 32px;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10}
    .logo{text-decoration:none;display:inline-flex;flex-direction:column;align-items:center;gap:2px}
    .logo-wordmark{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;line-height:1;background:linear-gradient(135deg,#1A1A18 30%,#1D9E75 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .logo-sub{font-size:8px;font-weight:400;color:var(--gray-400);letter-spacing:.04em;line-height:1}
    .back-link{font-size:13px;color:var(--gray-400);text-decoration:none;display:flex;align-items:center;gap:6px;font-weight:500}
    .back-link:hover{color:var(--gray-900)}

    .page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px}

    /* --- Hero text (shown before quiz starts) --- */
    .hero-text{text-align:center;max-width:560px;margin-bottom:48px}
    .hero-text h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(32px,6vw,52px);font-weight:800;line-height:1.1;margin-bottom:14px}
    .hero-text h1 em{font-style:normal;color:var(--teal)}
    .hero-text p{font-size:16px;color:var(--gray-400);line-height:1.6}

    /* --- Quiz card --- */
    .quiz-wrap{width:100%;max-width:540px}
    .progress{display:flex;gap:6px;margin-bottom:32px}
    .progress-dot{height:5px;border-radius:3px;flex:1;background:var(--gray-200);transition:background .35s}
    .progress-dot.active{background:var(--teal)}

    .step-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:8px;font-family:'Plus Jakarta Sans',sans-serif}
    .step-q{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(20px,4vw,26px);font-weight:800;color:var(--gray-900);margin-bottom:24px;line-height:1.25}
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt-btn{display:flex;align-items:center;gap:16px;background:#fff;border:1.5px solid var(--gray-200);border-radius:14px;padding:18px 22px;cursor:pointer;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:600;color:var(--gray-900);width:100%;transition:border-color .15s,background .15s}
    .opt-btn:hover{border-color:var(--teal);background:var(--teal-light)}
    .opt-btn .opt-e{font-size:26px;flex-shrink:0;width:36px;text-align:center}

    /* --- Result --- */
    .result{text-align:center;animation:fadeUp .4s ease}
    .result-emoji{font-size:64px;margin-bottom:20px}
    .result-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:10px;font-family:'Plus Jakarta Sans',sans-serif}
    .result-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(20px,4vw,28px);font-weight:800;color:var(--gray-900);margin-bottom:10px}
    .result-desc{font-size:16px;color:#6A6A64;margin-bottom:6px;line-height:1.5}
    .result-shop{font-size:13px;color:var(--gray-400);margin-bottom:32px}
    .result-cta{display:inline-block;background:var(--teal);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;padding:16px 40px;border-radius:12px;text-decoration:none;margin-bottom:16px}
    .restart-btn{display:block;background:none;border:none;font-size:13px;color:var(--gray-400);cursor:pointer;text-decoration:underline;margin:12px auto 0;font-family:'DM Sans',sans-serif}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<header>
  <a href="/" class="logo"><span class="logo-wordmark">sourceat</span><span class="logo-sub">source and eat</span></a>
  <a href="/" class="back-link">← Back to trends</a>
</header>

<div class="page">
  <div class="hero-text" id="fav-hero">
    <h1>Find your<br><em>favorite</em> K-food</h1>
    <p>Answer 3 quick questions and we'll match you with the perfect Korean food to try first.</p>
  </div>

  <div class="quiz-wrap">
    <div class="progress">
      <div class="progress-dot active" id="dot-1"></div>
      <div class="progress-dot" id="dot-2"></div>
      <div class="progress-dot" id="dot-3"></div>
    </div>
    <div id="quiz-body"></div>
  </div>
</div>

<script>
(function(){
  var STEPS=[
    {label:'Step 1 / 3',q:'How spicy can you go?',key:'spice',opts:[
      {e:'🧊',t:'Keep it mild — no spice please',v:'mild'},
      {e:'🌶️',t:'A little heat is fine',v:'medium'},
      {e:'🔥',t:'The hotter the better',v:'hot'}
    ]},
    {label:'Step 2 / 3',q:'What are you craving right now?',key:'type',opts:[
      {e:'🍜',t:'Noodles & Ramen',v:'noodles'},
      {e:'🍱',t:'Rice Rolls (Kimbap)',v:'rice'},
      {e:'🍿',t:'Snacks & Chips',v:'snacks'},
      {e:'🌮',t:'Street Food Kits',v:'street'}
    ]},
    {label:'Step 3 / 3',q:'Where do you usually shop?',key:'shop',opts:[
      {e:'📦',t:'Amazon — ship it to me',v:'amazon'},
      {e:'🏪',t:'H-Mart near me',v:'hmart'},
      {e:'🚚',t:'Weee! or Wooltari delivery',v:'weee'},
      {e:'🛒',t:"Wherever's cheapest",v:'any'}
    ]}
  ];

  var RESULTS={
    noodles:{
      hot:   {name:'Samyang Buldak 2× Spicy',   emoji:'🔥',desc:'The viral fire noodle challenge. Not for the faint-hearted.',   page:'/buldak'},
      medium:{name:'Samyang Buldak Original',    emoji:'🍜',desc:'The classic that started the global craze. Seriously addictive.', page:'/buldak'},
      mild:  {name:'Samyang Buldak Carbonara',   emoji:'🍝',desc:'Creamy, cheesy, mildly spicy — the perfect entry point.',        page:'/buldak'}
    },
    rice:  {name:'Pulmuone Tuna Mayo Kimbap',   emoji:'🍱',desc:'Fresh savory rice rolls. Like sushi but lighter and more filling.',page:'/kimbap'},
    snacks:{name:'Haitai Honey Butter Chip',    emoji:'🍯',desc:'The snack that sold out across Asia. Sweet, salty, addictive.',   page:'/snacks'},
    street:{name:'Ottogi Tteokbokki Kit',        emoji:'🌶️',desc:'Chewy rice cakes in spicy sauce — Seoul street food at home.',   page:'/tteokbokki'}
  };

  var SHOP_LABEL={amazon:'Available on Amazon Prime',hmart:'Find it at H-Mart',weee:'Order on Weee! or Wooltari',any:'Available across multiple stores'};
  var PAGE_LABEL={'/buldak':'See all Buldak flavors →','/kimbap':'Find kimbap near you →','/snacks':'Browse all K-snacks →','/tteokbokki':'See all street food →'};

  var step=0,ans={};

  function dots(){
    for(var i=1;i<=3;i++){
      var d=document.getElementById('dot-'+i);
      if(d) d.className='progress-dot'+(i<=step+1?' active':'');
    }
    var hero=document.getElementById('fav-hero');
    if(hero) hero.style.display=step===0?'':'none';
  }

  function render(){
    dots();
    var body=document.getElementById('quiz-body');

    if(step>=3){
      var t=ans.type,s=ans.spice;
      var r=t==='noodles'?RESULTS.noodles[s]:RESULTS[t];
      var shopTxt=SHOP_LABEL[ans.shop]||SHOP_LABEL.any;
      var ctaTxt=PAGE_LABEL[r.page]||'See products →';
      body.innerHTML='<div class="result">'
        +'<div class="result-emoji">'+r.emoji+'</div>'
        +'<div class="result-label">Your match</div>'
        +'<div class="result-name">'+r.name+'</div>'
        +'<div class="result-desc">'+r.desc+'</div>'
        +'<div class="result-shop">'+shopTxt+'</div>'
        +'<a href="'+r.page+'" class="result-cta">'+ctaTxt+'</a>'
        +'<button class="restart-btn" onclick="window._favRestart()">Start over</button>'
        +'</div>';
      return;
    }

    var s=STEPS[step];
    var opts=s.opts.map(function(o){
      return '<button class="opt-btn" onclick="window._favChoose(\''+s.key+'\',\''+o.v+'\')">'
        +'<span class="opt-e">'+o.e+'</span>'
        +'<span>'+o.t+'</span>'
        +'</button>';
    }).join('');

    body.innerHTML='<div style="animation:fadeUp .3s ease">'
      +'<div class="step-label">'+s.label+'</div>'
      +'<div class="step-q">'+s.q+'</div>'
      +'<div class="opts">'+opts+'</div>'
      +'</div>';
  }

  window._favChoose=function(key,val){ans[key]=val;step++;render();};
  window._favRestart=function(){
    step=0;ans={};
    var hero=document.getElementById('fav-hero');
    if(hero) hero.style.display='';
    render();
  };

  render();
})();
</script>
</body>
</html>
