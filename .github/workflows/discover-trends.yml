name: Weekly K-Food Trend Discovery

on:
  schedule:
    # 매주 월요일 KST 오전 9시 (UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 수동 실행

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt pytrends

      - name: Discover trends
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/discover_trends.py > /tmp/trend_report.md

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="트렌드 후보 — $(date +'%Y-%m-%d')"
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/trend_report.md
