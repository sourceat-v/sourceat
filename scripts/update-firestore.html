        });
        log.textContent += '✅ Firestore 업데이트 완료!\n';
        log.textContent += '이제 sourceat.vercel.app 을 새로고침하면 반영됩니다.';
        btn.textContent = '✅ 완료';
      } catch(err) {
        log.textContent += `❌ 오류: ${err.message}\n`;
        log.textContent += 'Firebase Console에서 Firestore 규칙 확인이 필요할 수 있습니다.';
        btn.disabled = false;
      }
    };
  </script>
</body>
